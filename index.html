<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- CSS only -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi" crossorigin="anonymous">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-OERcA2EqjJCMA+/3y+gxIOqMEjwtxJY7qPCqsdltbNJuaOe923+mo//f6V8Qbsw3" crossorigin="anonymous"></script>
<style>
     body{
        background-color: black;
    }
    p{
        font-family:Georgia, 'Times New Roman', Times, serif;
        color: darkcyan;
        text-align: center;
    }
</style>

</head>
<body>

    <div class="border border-secondary container bg-light p-3 mt-5 " style="width:27%; border-radius: 20px;">
        <p class="fs-1  w-40 container">Calculator</p>            <div>
            <input id="result" type="text" class="form-control w-5">
        </div>
        <div class="row mt-2 me-1 ms-2">
            <div class="col-3"><button onclick="display('1')" class="btn btn-outline-warning">1</button></div>
            <div class="col-3"><button onclick="display('2')" class="btn btn-outline-info">2</button></div>
            <div class="col-3"><button onclick="display('3')" class="btn btn-outline-warning">3</button></div>
            <div class="col-3"><button onclick="display('/')" class="btn btn-outline-info">/</button></div>
        </div>
        <div class="row mt-2 me-1  ms-2">
            <div class="col-3"><button onclick="display('4')" class="btn btn-outline-warning">4</button></div>
            <div class="col-3"><button onclick="display('5')" class="btn btn-outline-info">5</button></div>
            <div class="col-3"><button onclick="display('6')" class="btn btn-outline-warning">6</button></div>
            <div class="col-3"><button onclick="display('*')" class="btn btn-outline-info">*</button></div>
        </div>
        <div class="row mt-2 me-1  ms-2">
            <div class="col-3"><button onclick="display('7')" class="btn btn-outline-warning">7</button></div>
            <div class="col-3"><button onclick="display('8')" class="btn btn-outline-info">8</button></div>
            <div class="col-3"><button onclick="display('9')" class="btn btn-outline-warning">9</button></div>
            <div class="col-3"><button onclick="display('-')" class="btn btn-outline-info">-</button></div>
        </div>
        <div class="row mt-2 me-1  ms-2">
            <div class="col-3"><button onclick="display('0')" class="btn btn-outline-warning">0</button></div>
            <div class="col-3"><button onclick="allclear()" class="btn btn-outline-info">AC</button></div>
            <div class="col-3"><button onclick="display('+')" class="btn btn-outline-warning">+</button></div>
            <div class="col-3"><button onclick="evaluateexp()" class="btn btn-outline-info">=</button></div>

        </div>
        <div class="container mt-2 w-50 ms-3">
            <div class="ms-5"><button onclick="backspace()" class="container btn btn-outline-info text-center">&#9003;</button></div>
        </div>
    </div>
</body>
<script src="./calc.js"></script>
</html>
